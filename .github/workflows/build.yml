name: TerLinux CI/CD

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0'  # كل يوم أحد
  workflow_dispatch:  # تشغيل يدوي

jobs:
  # وظيفة البناء
  build:
    name: Build TerLinux APK
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Grant execute permission
      run: chmod +x gradlew
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug
    
    - name: Build Release APK
      run: ./gradlew assembleRelease
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: TerLinux-Debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: TerLinux-Release
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30

  # وظيفة الاختبارات
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Run Unit Tests
      run: ./gradlew test
    
    - name: Upload Test Reports
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: app/build/reports/tests/
        retention-days: 7

  # وظيفة الإنشاء التلقائي للإصدارات
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Download Debug APK
      uses: actions/download-artifact@v4
      with:
        name: TerLinux-Debug
        path: apks/
    
    - name: Download Release APK
      uses: actions/download-artifact@v4
      with:
        name: TerLinux-Release
        path: apks/
    
    - name: Get Version Name
      id: version
      run: |
        VERSION=$(date +'%Y.%m.%d')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: TerLinux v${{ steps.version.outputs.version }}
        body: |
          ## 📱 TerLinux APK
          
          ### ✅ التحديثات:
          - بناء تلقائي بتاريخ ${{ steps.version.outputs.version }}
          - إصلاحات وتحسينات مستمرة
          
          ### 📦 ملفات APK:
          - **Debug**: للاختبار والتطوير
          - **Release**: للاستخدام اليومي
        files: |
          apks/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # وظيفة إشعارات (اختياري)
  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [build, test]
    if: failure()
    
    steps:
    - name: Notify on Failure
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: '❌ Build Failed',
            body: 'فشل البناء في workflow `' + context.workflow + '`\n\nالرجاء مراجعة الأخطاء وإصلاحها.'
          })

  # وظيفة مع cache
  build-with-cache:
    name: Build with Cache
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Cache Gradle
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Build with Gradle
      run: ./gradlew assembleDebug
